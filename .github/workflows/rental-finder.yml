name: 賃貸物件検索＆LINE通知

on:
  schedule:
    # 毎日20:00（日本時間）に実行 = UTC 11:00
    - cron: "0 11 * * *"
  workflow_dispatch: # 手動実行も可能
  repository_dispatch: # LINEからのオンデマンド実行
    types: [line_on_demand]

jobs:
  search-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r rental-finder/requirements.txt

      - name: Run rental finder
        working-directory: rental-finder
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_BROADCAST: "true"
        run: python main.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rental-results-${{ github.run_number }}
          path: rental-finder/results/
          retention-days: 30
